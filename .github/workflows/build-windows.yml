name: build-windows-zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PY_EMBED: "3.12.7"
      PKG: dist/GGUFChat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Зависимости в libs (офлайн)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force "$env:PKG" | Out-Null
          python -m pip install --upgrade pip
          python -m pip install --target "$env:PKG/libs" -r requirements.txt

      - name: Вложить код
        shell: pwsh
        run: Copy-Item app.py, engine.py, documents.py, constants.py "$env:PKG/"

      - name: Встроить переносимый Python
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://www.python.org/ftp/python/$env:PY_EMBED/python-$env:PY_EMBED-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile py.zip
          Expand-Archive py.zip -DestinationPath "$env:PKG" -Force
          $pth = (Get-ChildItem "$env:PKG" -Filter "python*._pth" | Select-Object -First 1).FullName
          Set-Content $pth @('python312.zip', '.', 'libs', 'import site')

      - name: Скачать llama-server (CUDA) + cudart
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rel = Invoke-RestMethod -Headers @{ "User-Agent" = "gguf-ui" } `
                 -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          $cuda = $rel.assets |
            Where-Object { $_.name -match '(?i)bin-win-cuda-.*x64.*\.zip$' -and $_.name -notmatch '(?i)cudart' } |
            Sort-Object name -Descending | Select-Object -First 1
          if (-not $cuda) { throw "Не найден ассет CUDA в релизе $($rel.tag_name)" }
          $ver = ([regex]::Match($cuda.name, '(?i)cuda-(\d+\.\d+)')).Groups[1].Value
          $cudart = $rel.assets | Where-Object { $_.name -match '(?i)cudart' -and $_.name -match [regex]::Escape($ver) } | Select-Object -First 1
          if (-not $cudart) { $cudart = $rel.assets | Where-Object { $_.name -match '(?i)cudart' } | Sort-Object name -Descending | Select-Object -First 1 }
          Write-Host "Релиз $($rel.tag_name): $($cuda.name) + $($cudart.name)"

          New-Item -ItemType Directory -Force _dl, "$env:PKG/llama_server" | Out-Null
          Invoke-WebRequest -Uri $cuda.browser_download_url   -OutFile _dl/cuda.zip
          Invoke-WebRequest -Uri $cudart.browser_download_url -OutFile _dl/cudart.zip
          Expand-Archive _dl/cuda.zip   -DestinationPath _dl/cuda   -Force
          Expand-Archive _dl/cudart.zip -DestinationPath _dl/cudart -Force
          $exe = Get-ChildItem _dl/cuda -Recurse -File | Where-Object { $_.Name -match '(?i)llama-server\.exe$' } | Select-Object -First 1
          if (-not $exe) { throw "llama-server.exe не найден" }
          Copy-Item (Join-Path $exe.Directory.FullName '*') "$env:PKG/llama_server" -Recurse -Force
          Get-ChildItem _dl/cudart -Recurse -Filter *.dll | ForEach-Object { Copy-Item $_.FullName "$env:PKG/llama_server" -Force }
          Remove-Item -Recurse -Force _dl

      - name: Лаунчер start.bat
        shell: pwsh
        run: Set-Content "$env:PKG/start.bat" @('@echo off', 'cd /d "%~dp0"', 'python.exe app.py')

      - name: Проверка импорта в переносимом Python (офлайн)
        shell: pwsh
        env:
          HF_HUB_OFFLINE: "1"
          GRADIO_ANALYTICS_ENABLED: "False"
        run: |
          Push-Location "$env:PKG"
          .\python.exe -c "import gradio, app; print('import OK')"
          Pop-Location

      - name: Упаковать ZIP
        shell: pwsh
        run: Compress-Archive -Path "$env:PKG/*" -DestinationPath GGUFChat-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: GGUFChat-windows
          path: GGUFChat-windows.zip
          retention-days: 30
