name: build-windows-exe

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Поставить инструменты сборки
        run: python -m pip install --upgrade pip pyinstaller pypdf python-docx

      - name: Скачать официальный llama.cpp (CUDA) + CUDA runtime
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = Invoke-RestMethod -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; "User-Agent" = "gguf-ui-ci" } `
                 -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"

          $cuda = $rel.assets | Where-Object { $_.name -match 'bin-win-cuda.*x64\.zip$' }
          $cuda = ($cuda | Where-Object { $_.name -match '12' } | Select-Object -First 1) ?? ($cuda | Select-Object -First 1)
          $cudart = $rel.assets | Where-Object { $_.name -match 'cudart.*win.*x64\.zip$' }
          $cudart = ($cudart | Where-Object { $_.name -match '12' } | Select-Object -First 1) ?? ($cudart | Select-Object -First 1)

          if (-not $cuda)   { throw "Не найден ассет llama.cpp CUDA в релизе $($rel.tag_name)" }
          if (-not $cudart) { throw "Не найден ассет cudart в релизе $($rel.tag_name)" }
          Write-Host "Релиз: $($rel.tag_name)"
          Write-Host "CUDA:   $($cuda.name)"
          Write-Host "cudart: $($cudart.name)"

          Invoke-WebRequest -Uri $cuda.browser_download_url   -OutFile cuda.zip
          Invoke-WebRequest -Uri $cudart.browser_download_url -OutFile cudart.zip

          Remove-Item -Recurse -Force staging, build/llama_server -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force staging | Out-Null
          New-Item -ItemType Directory -Force staging/cuda | Out-Null
          New-Item -ItemType Directory -Force staging/cudart | Out-Null
          New-Item -ItemType Directory -Force build/llama_server | Out-Null

          Expand-Archive cuda.zip   -DestinationPath staging/cuda  -Force
          Expand-Archive cudart.zip -DestinationPath staging/cudart -Force

          $exe = Get-ChildItem -Path staging -Recurse -Filter 'llama-server.exe' -File | Select-Object -First 1
          if (-not $exe) {
            Write-Host "=== staging/cuda ==="; Get-ChildItem -Recurse staging/cuda | Select-Object FullName
            Write-Host "=== staging/cudart ==="; Get-ChildItem -Recurse staging/cudart | Select-Object FullName
            throw "Не найден llama-server.exe в распакованных архивах (см. листинг)"
          }

          Write-Host "Найден llama-server.exe: $($exe.FullName)"
          $exeDir = $exe.Directory.FullName
          Copy-Item -Path (Join-Path $exeDir '*') -Destination build/llama_server -Recurse -Force

          Get-ChildItem -Path staging/cudart -Recurse -Filter '*.dll' -File | ForEach-Object {
            Copy-Item $_.FullName -Destination (Join-Path (Resolve-Path build/llama_server).Path $_.Name) -Force
          }

          Write-Host "Содержимое build/llama_server:"
          Get-ChildItem build/llama_server -Recurse | Select-Object FullName

      - name: Проверить, что движок на месте
        shell: pwsh
        run: |
          if (!(Test-Path build/llama_server/llama-server.exe)) {
            Write-Host "=== staging ==="; Get-ChildItem -Recurse staging | Select-Object FullName
            Write-Host "=== build/llama_server ==="; Get-ChildItem -Recurse build/llama_server | Select-Object FullName
            throw "Нет llama-server.exe — структура архива неожиданная (см. листинг)"
          }
          Write-Host "llama-server.exe на месте."

      - name: Сборка (PyInstaller onedir)
        run: pyinstaller gguf-ui.spec --noconfirm

      - name: Проверить состав сборки
        shell: pwsh
        run: |
          $root = "dist/GGUFChat/_internal"
          if (!(Test-Path "$root/llama_server/llama-server.exe")) { throw "В сборке нет llama-server.exe" }
          Write-Host "Сборка в порядке."

      - uses: actions/upload-artifact@v4
        with:
          name: GGUFChat-windows
          path: dist/GGUFChat
          retention-days: 30

      - name: Диагностическая сборка (консоль + GGUF_DEBUG)
        env:
          GGUF_CONSOLE: "1"
          GGUF_APP_NAME: "GGUFChat-debug"
        run: pyinstaller gguf-ui.spec --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: GGUFChat-windows-debug
          path: dist/GGUFChat-debug
          retention-days: 30
